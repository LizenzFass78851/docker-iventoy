name: Update Tagged Versions

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-slim
    if: github.repository == 'LizenzFass78851/docker-iventoy'
    env:           
      GIT_USER: github-actions[bot]
      GIT_EMAIL: github-actions[bot]@users.noreply.github.com

    steps:
      - name: clone
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Find latest tag (update build)
        id: update_build_find_latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ventoy/PXE
        run: |
          if ! LATEST_TAG=$(gh api repos/$REPOSITORY/releases/latest --jq '.tag_name' 2>/dev/null); then
            echo "::error::Failed to fetch latest tag for repository $REPOSITORY"
          elif [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "::warning::No tags found for repository $REPOSITORY"
          else
            echo "::notice::Latest tag for repository $REPOSITORY: $LATEST_TAG"
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
      - name: update build
        id: update_build
        run: |
          LATEST_TAG_LONG=${{ steps.update_build_find_latest.outputs.tag }}
          LATEST_TAG=${LATEST_TAG_LONG#v}
          
          echo "BUILD_VER: $LATEST_TAG"

          [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "null" ] && echo 'patching file' && sed -i "s|ARG IVENTOY_VERSION=.*|ARG IVENTOY_VERSION=\"$LATEST_TAG\"|g" $GITHUB_WORKSPACE/Dockerfile; \

          # Commit changes if any
          git add Dockerfile
          git status
          git config --local user.name ${{ env.GIT_USER }}
          git config --local user.email ${{ env.GIT_EMAIL }}
          if ! git diff --cached --quiet; then
            git commit -m "feat: Update iventoy to ${LATEST_TAG}"
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: create_pr_branchname
        id: create_pr_branchname
        run: |
          echo "generating SHA File"
          hash=$(cat $GITHUB_WORKSPACE/Dockerfile \
            | sha256sum - --tag \
            | awk '{print $4}')
          if [[ "$hash" =~ ^[a-f0-9]{64}$ ]]; then
            echo "HASH=$hash" > $GITHUB_OUTPUT
          else
            echo "::error:: Error: no valid SHA256" >&2 && exit 1
          fi

      - name: check if branch as open PR
        id: check_open_pr
        env:
          PR_BRANCH: feat/update-tagged_versions-${{ steps.create_pr_branchname.outputs.HASH }}
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN_PR=$(gh pr list --state open --head "$PR_BRANCH" --json number -q '.[0].number')
          if [ -z "$OPEN_PR" ]; then
            echo "NO_OPEN_PR=true" >> $GITHUB_OUTPUT
          else
            echo "NO_OPEN_PR=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: ${{ steps.check_open_pr.outputs.NO_OPEN_PR == 'true' }}
        uses: peter-evans/create-pull-request@v8
        id: create_pr
        with:
          token: ${{ secrets.PR_TOKEN }}
          title: 'Update Tagged Versions'
          branch: feat/update-tagged_versions-${{ steps.create_pr_branchname.outputs.HASH }}
          delete-branch: true
          assignees: ${{ github.actor }}

